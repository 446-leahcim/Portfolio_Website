<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="portstyles.css">
    <title>Document</title>
    <style>
        
        .container {
            width: 400px;
            height: 200px;
            position: relative;
            background: #f0f0f0;
            overflow: hidden;
            margin: auto;
            align-self: center;
            align-items: center;
            margin-top: 250px;
            border-radius: 5px;
        }
        #animateBox {
            width: 50px;
            height: 50px;
            position: absolute;
            background: red;
            top: 0;
            left: 0;
        }
        .uwu{
            width: 100px;
            height: 100px;
            background-color: red;
            color: white;
            text-align: center;
            line-height: 100px;
            transition: width 0.5s, background-color 2s;
        }

        .uwu:hover {
            width: 300px;
            background-color: dodgerblue;
        }
    </style>
</head>
<body>
      <section id="top-bar">
        <div class="home-button">
            <a href="portfolio-homepage.html">Home</a>
        </div>
        <div class="achivments-button">
            <a href="portfolio-achivments.html">Projects</a>
        </div>
        <div class="resume-button">
            <a href="portfolio-resume.html">Resume </a>
        </div>
        <div class="life-style">
            <a href="portfolio-lifestyle.html"> Contact Info</a>
        </div>
    </section>
    <div class="container">
   
    <div class="uwu"> <div id="animateBox"></div></div>
    <h2>hover your cussor over the red box</h2>
</div>

<script>
    const element = document.getElementById("animateBox");
const flexie = document.querySelector(".uwu");
let positionX = 0;
let direction = 1; // 1 for right, -1 for left

function animate() {
    const containerWidth = flexie.offsetWidth;
    const boxWidth = element.offsetWidth;
    const maxPosition = containerWidth - boxWidth;

    // Move the box horizontally
    positionX += direction;
    if (positionX >= maxPosition) {
        positionX = maxPosition;
        direction = -1;
    } else if (positionX <= 0) {
        positionX = 0;
        direction = 1;
    }
    element.style.left = positionX + 'px';

    requestAnimationFrame(animate);
}

// Start the animation loop
animate();
</script>
</body>
</html>
