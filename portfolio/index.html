<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="DBstyle.css">
    <link rel="stylesheet" href="portstyles.css">
    <title>Document</title>
    <style>
        .container{
    width: 95%;
    height: 90vh;
    margin: auto;
    border: 1px solid black;
    padding: 10px;
    align-content: center;
    justify-content: center;
    justify-items: center;
    border-radius: 20px;
    gap: 5px;
        background-color: rgba(256, 256, 256, .60);

}
.book-list{
    width: 300px;
    height: fit-content;
    margin: auto;
    padding: 10px;
    border: 1px solid black;
    border-radius: 20px;
    background-color: rgba(256, 256, 256, .60);
}
#addBook{
    background-color: rgb(0, 166, 255);
}
#addBook2{
    background-color: rgb(0, 166, 255);
}
#removebooks{
     width: 300px;
    height: 50px;
    margin: auto;
    padding: 10px;
    border: 1px solid black;
    border-radius: 20px;
    align-content: center;
}
#removebookfront{
    background-color: rgb(255, 77, 0);
}
#removebookback{
    background-color: rgb(255, 77, 0);
}
    </style>
</head>
<body>
    <section id="top-bar">
        <div class="home-button">
            <a href="portfolio-homepage.html">Home</a>
        </div>
        <div class="achivments-button">
            <a href="portfolio-achivments.html">Projects</a>
        </div>
        <div class="resume-button">
            <a href="portfolio-resume.html">Resume </a>
        </div>
        <div class="life-style">
            <a href="portfolio-lifestyle.html"> Life-Style</a>
        </div>
    </section>
    <div class="container">
        <h2> My Digital Library</h3>
        <div class="input-section">
            <!--create a digital bookshelf that can put the book titles in a list-->
            <textarea name="" id="inputText" cols="30" rows="1"></textarea>
            <button id="addBook">Add Book to front</button>
            <button id="addBook2"> Add Book to Back</button>
        </div>
        <div id="removebooks">
            <button id="removebookfront">remove the first Book</button>
            <button id="removebookback">remove the last Book</button>
        </div>
        <div class="book-list">
            <h2>My Book List</h2>
            <ul id="bookList"></ul>
        </div>
    </div>
</body>
<script>
    let bookArray = ["The Great Gatsby", "To Kill a Mockingbird", "1984"];

function renderBookList() {
    const bookList = document.getElementById('bookList');
    bookList.innerHTML = '';
    bookArray.forEach(title => {
        const li = document.createElement('li');
        li.textContent = title;
        bookList.appendChild(li);
    });
}
renderBookList();

function addBook() {
    const bookTitle = document.getElementById('inputText').value;
    if (bookTitle) {
        bookArray.unshift(bookTitle); // Add to the top
        renderBookList();
        document.getElementById('inputText').value = '';
    }
}

document.getElementById('addBook').addEventListener('click', addBook);

function addBook2() {
    const bookTitle = document.getElementById('inputText').value;
    if (bookTitle) {
        bookArray.push(bookTitle); // Add to the bottom
        renderBookList();
        document.getElementById('inputText').value = '';
    }
}

document.getElementById('addBook2').addEventListener('click', addBook2);

function removeBookFront() {
    if (bookArray.length > 0) {
        bookArray.shift(); // Remove the first (top) book
        renderBookList();
    }
}

document.getElementById('removebookfront').addEventListener('click', removeBookFront);

function removeBookBack() {
    if (bookArray.length > 0) {
        bookArray.pop(); // Remove the last (bottom) book
        renderBookList();
    }
}
document.getElementById('removebookback').addEventListener('click', removeBookBack);


</script>
</html>
